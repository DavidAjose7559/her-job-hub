<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Her Job Hub</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="header">
      <div class="logo">✨</div>
      <div class="header-text">
        <div class="title">Her Job Hub</div>
        <div class="subtitle">Auto-Fill Assistant</div>
      </div>
    </div>

    <!-- Loading -->
    <div id="state-loading" class="state">
      <div class="loading-row">
        <div class="spinner"></div>
        <span>Loading profile…</span>
      </div>
    </div>

    <!-- Error / timeout -->
    <div id="state-error" class="state hidden">
      <div class="info-box">
        <div class="info-icon">⚠️</div>
        <p id="error-msg">Something went wrong loading your profile.</p>
        <button type="button" class="btn btn-primary btn-sm open-app-btn">Open Her Job Hub →</button>
      </div>
    </div>

    <!-- Not logged in -->
    <div id="state-loggedout" class="state hidden">
      <div class="info-box">
        <div class="info-icon">🔒</div>
        <p>Log in to Her Job Hub to use auto-fill.</p>
        <button type="button" class="btn btn-primary btn-sm open-app-btn">Open Her Job Hub →</button>
      </div>
    </div>

    <!-- No app tab open -->
    <div id="state-notab" class="state hidden">
      <div class="info-box">
        <div class="info-icon">🔗</div>
        <p>Open Her Job Hub in a tab first, then come back here.</p>
        <button type="button" class="btn btn-primary btn-sm open-app-btn">Open Her Job Hub →</button>
      </div>
    </div>

    <!-- Logged in + ready -->
    <div id="state-ready" class="state hidden">
      <div class="profile-card">
        <div class="profile-avatar" id="profile-avatar">D</div>
        <div>
          <div class="profile-name" id="profile-name"></div>
          <div class="profile-email" id="profile-email"></div>
        </div>
      </div>

      <div class="page-hint" id="page-hint"></div>

      <button id="autofill-btn" class="btn btn-primary">
        <span id="btn-icon">⚡</span>
        <span id="btn-text">Auto-fill this page</span>
      </button>

      <div id="fill-result" class="fill-result hidden"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button type="button" class="app-link open-app-btn">Open Her Job Hub ↗</button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
